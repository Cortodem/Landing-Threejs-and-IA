<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación 3D en Canvas</title>
    <style>
        body {
            margin: 0;
            height: 400vh; /* Para permitir el desplazamiento */
        }
        canvas {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="miCanvas" width="800" height="600"></canvas>
</body>

<script src="script.js"></script>
</html>
