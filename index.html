    <main>
        <section class="info">
            <div class="block-info"></div>

            <div><button onclick="closeInfo()" style="padding: 100px;">X</button></div>
        </section>
    </main>

    <script type="importmap">
    {
    "imports": {
        "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
        "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js",
        "gsap/ScrollTrigger": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/ScrollTrigger.js"
    }
    }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script type="module" src="main.js"></script>
    <script>
        // Mover scroll a objeto al hacer clic en menú
        globalThis.irAObjeto = (id) => {
            console.log("irAObjeto run con id:" + id);


            const indices = { 'clases': 0, 'jefes': 0.5, 'personal': 0.25, 'premios': 0.75 };
            const progresoDestino = indices[id];

            window.scrollTo({
                top: progresoDestino * (document.body.scrollHeight - window.innerHeight),
                behavior: 'smooth'
            });
        };

        //Cerrar información
        function closeInfo() {
            const infoElement = document.querySelector('.info');
            if (infoElement) {
                infoElement.style.opacity = 0;
                infoElement.style.pointerEvents = 'none';
            }
        }
    </script>
